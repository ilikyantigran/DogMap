# Config for running locally with `go run` (host addresses).
# Same keys as values_docker.yaml; only the values differ.
auth_service:
  host: localhost
  grpc_port: "8080"
  http_port: "8081"

postgres:
  dsn: postgres://postgres:postgres@localhost:5432/dogmap?sslmode=disable

valkey:
  address: 127.0.0.1:6379

downstreams:
  profiles: localhost:8090   # Profiles gRPC (CreateProfile handoff)

auth:
  session_ttl_seconds: 86400  # 24h sliding session TTL
  argon2_memory_kib: 65536    # 64 MiB
  argon2_iterations: 3
  argon2_parallelism: 2
