# Config for running locally with `go run` (host addresses).
# Same keys as values_docker.yaml; only the values differ.
map_service:
  host: localhost # in-process gateway dials its own gRPC server
  grpc_port: "8084"
  http_port: "8085"

valkey:
  address: 127.0.0.1:6379

postgres:
  dsn: postgres://postgres:postgres@localhost:5432/dogmap?sslmode=disable

map:
  radius_meters: 5000
  presence_ttl_seconds: 900
  janitor_interval_seconds: 60
